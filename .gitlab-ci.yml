stages:
  - build
  - deploy

.build_frontend:
  stage: build
  image: node:22-alpine
  variables:
    HUSKY: '0'
    NODE_ENV: production
  before_script:
    # pnpm 11.1.1 (packageManager) требует Node >= 22.13; на Node 20 падает с node:sqlite
    - npm install -g pnpm@11.1.1
    - pnpm install --frozen-lockfile
  script:
    - pnpm run build
  artifacts:
    paths:
      - .output
  tags:
    - docker
    - $CI_JOB_STAGE

build frontend:
  extends: .build_frontend
  environment:
    name: $CI_COMMIT_BRANCH
    url: https://olimp.portalrent.ru
  rules:
    - if: $CI_COMMIT_BRANCH != 'portal' && $CI_COMMIT_REF_PROTECTED == 'true'

.deploy_frontend:
  stage: deploy
  script:
    - DEPLOY_DIR=/var/www/portalrent/${CI_PROJECT_NAME}/${CI_COMMIT_BRANCH}
    - mkdir -p "$(dirname "${DEPLOY_DIR}")"
    - |
      if [ ! -d "${DEPLOY_DIR}/.git" ]; then
        rm -rf "${DEPLOY_DIR}"
        git clone --branch "${CI_COMMIT_BRANCH}" --depth 1 "${CI_REPOSITORY_URL}" "${DEPLOY_DIR}"
      else
        cd "${DEPLOY_DIR}"
        git fetch "${CI_REPOSITORY_URL}" "${CI_COMMIT_BRANCH}"
        git reset --hard FETCH_HEAD
        git clean -fd
      fi
    - rm -rf ${DEPLOY_DIR}/.output
    - cp -rf ${CI_PROJECT_DIR}/.output ${DEPLOY_DIR}/
    - test -f ${DEPLOY_DIR}/.output/public/index.html
    - |
      # MM notification publish
      curl -s -X POST -H "Content-Type: application/json; charset=utf-8" -H "Authorization: Bearer ${MM_BOT}" \
        -d "{\"channel_id\":\"${MM_GROUP}\",\"message\":\"Загружено [**${CI_PROJECT_NAME} / ${CI_ENVIRONMENT_NAME}**](${CI_ENVIRONMENT_URL})\nВетка: ${CI_COMMIT_BRANCH}\nАвтор: ${CI_COMMIT_AUTHOR}\nПравка: [${CI_COMMIT_TITLE}](${CI_PROJECT_URL}/-/commit/${CI_COMMIT_SHA})\"}" \
        https://mm.grandfs-develop.ru/api/v4/posts > /dev/null

deploy production:
  extends: .deploy_frontend
  environment:
    name: $CI_COMMIT_BRANCH
    url: https://olimp.portalrent.ru
  needs:
    - build frontend
  only:
    refs:
      - develop
      - main
  tags:
    - shell
    - grand232
